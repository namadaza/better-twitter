name: Refresh external feed

on:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run ingest

      - name: Fetch artwork from WikiArt
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          # Optional: if these WikiArt secrets are set the script will use the WikiArt API
          WIKIART_ACCESS_KEY: ${{ secrets.WIKIART_ACCESS_KEY }}
          WIKIART_SECRET_KEY: ${{ secrets.WIKIART_SECRET_KEY }}
        run: |
          pnpm run ingest:wikiart

      - name: Commit updated feed and WikiArt manifest
        run: |
          if git diff --quiet src/lib/data/external-feed.json src/lib/data/wikiart_artworks.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/external-feed.json src/lib/data/wikiart_artworks.json
          git commit -m "chore(ingest): refresh external feed and wikiart artworks"
          git push
