name: Refresh external feed

on:
  schedule:
    # Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ingest

      - name: Fetch Wikimedia Commons artwork
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          npm run ingest:commons

      - name: Commit updated feed and commons manifest
        run: |
          if git diff --quiet src/lib/data/external-feed.json src/lib/data/commons_artworks.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/external-feed.json src/lib/data/commons_artworks.json
          git commit -m "chore(ingest): refresh external feed and commons artworks"
          git push
